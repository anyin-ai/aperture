services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - aperture_data:/app/data
    environment:
      - DATABASE_URL=sqlite:////app/data/aperture.db
      # Frontend talks to the backend same-origin via nginx, so CORS is moot in
      # this topology. Set explicit origins here if you call the API directly.
      - CORS_ALLOW_ORIGINS=http://localhost:3000
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  aperture_data:
